name: opentelekomcloud-community/packer-plugin-tcloud/build_plugin_binaries

permissions:
  contents: read

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build ${{ matrix.goos }} ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: freebsd
            goarch: "386"
          - goos: freebsd
            goarch: amd64
          - goos: freebsd
            goarch: arm
          - goos: linux
            goarch: "386"
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: ppc64le
          - goos: netbsd
            goarch: "386"
          - goos: netbsd
            goarch: amd64
          - goos: netbsd
            goarch: arm
          - goos: openbsd
            goarch: "386"
          - goos: openbsd
            goarch: amd64
          - goos: openbsd
            goarch: arm
          - goos: solaris
            goarch: amd64
          - goos: windows
            goarch: "386"
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Build plugin
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p pkg
          artifact="packer_plugin_tcloud_${GOOS}_${GOARCH}"
          go build -o "./pkg/${artifact}" .
          zip "./pkg/${artifact}.zip" "./pkg/${artifact}"
          rm "./pkg/${artifact}"
      - uses: actions/upload-artifact@v7
        with:
          name: packer_plugin_tcloud_${{ matrix.goos }}_${{ matrix.goarch }}.zip
          path: pkg/packer_plugin_tcloud_${{ matrix.goos }}_${{ matrix.goarch }}.zip
          retention-days: 30
